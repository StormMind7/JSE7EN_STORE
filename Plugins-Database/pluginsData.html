<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plugin Database</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: #2a2a3a;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --accent3: #f59e0b;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --mono: #3f3f60;
    --stereo: #1a3a2a;
    --quad: #3a1a1a;
    --five: #1a2a3a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,58,237,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,58,237,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 0 24px; }

  /* HEADER */
  header {
    padding: 40px 0 24px;
    border-bottom: 1px solid var(--border);
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 8px;
  }

  .logo-badge {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 18px;
    flex-shrink: 0;
  }

  h1 {
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #fff 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .stat {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
  }

  .stat-num {
    font-size: 20px;
    font-weight: 700;
    color: var(--accent2);
  }

  .stat-label { color: var(--muted); }

  /* SEARCH */
  .search-section {
    padding: 24px 0;
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }

  .search-wrapper {
    position: relative;
    max-width: 700px;
  }

  .search-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 18px;
    pointer-events: none;
  }

  #searchInput {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px 14px 48px;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  #searchInput:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
  }

  #searchInput::placeholder { color: var(--muted); }

  #searchCount {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }

  /* FILTERS */
  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 14px;
    align-items: center;
  }

  .filter-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-right: 4px;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 12px;
    border-radius: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--text); }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .filter-btn.mono-filter.active { background: #4a1d96; border-color: #7c3aed; color: #c4b5fd; }
  .filter-btn.stereo-filter.active { background: #064e3b; border-color: #10b981; color: #6ee7b7; }
  .filter-btn.multi-filter.active { background: #7c2d12; border-color: #f97316; color: #fdba74; }

  /* VENDOR GRID */
  .vendors-section { padding: 32px 0; }

  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }

  .section-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  .section-line { flex: 1; height: 1px; background: var(--border); }

  .vendors-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }

  /* VENDOR CARD */
  .vendor-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
  }

  .vendor-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .vendor-card.hidden { display: none; }

  .vendor-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  .vendor-header:hover { background: var(--surface2); }

  .vendor-left { display: flex; align-items: center; gap: 10px; }

  .vendor-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .vendor-name {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }

  .vendor-right { display: flex; align-items: center; gap: 8px; }

  .vendor-count {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2px 8px;
    color: var(--muted);
  }

  .vendor-toggle {
    color: var(--muted);
    font-size: 14px;
    transition: transform 0.2s;
  }

  .vendor-card.expanded .vendor-toggle { transform: rotate(180deg); }

  /* PLUGIN LIST */
  .plugin-list {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
  }

  .vendor-card.expanded .plugin-list { max-height: 9999px; }

  .plugin-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    transition: background 0.1s;
    gap: 8px;
  }

  .plugin-item:last-child { border-bottom: none; }
  .plugin-item:hover { background: var(--surface2); }
  .plugin-item.hidden-item { display: none; }

  .plugin-name {
    font-size: 13px;
    color: var(--text);
    flex: 1;
    font-weight: 500;
  }

  .plugin-name mark {
    background: rgba(124,58,237,0.4);
    color: #c4b5fd;
    border-radius: 3px;
    padding: 0 1px;
  }

  .tag-row { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; }

  .tag {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
    font-weight: 700;
  }

  .tag-mono { background: rgba(124,58,237,0.15); color: #a78bfa; border: 1px solid rgba(124,58,237,0.2); }
  .tag-stereo { background: rgba(16,185,129,0.1); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.2); }
  .tag-ms { background: rgba(245,158,11,0.1); color: #fcd34d; border: 1px solid rgba(245,158,11,0.2); }
  .tag-51 { background: rgba(239,68,68,0.1); color: #fca5a5; border: 1px solid rgba(239,68,68,0.2); }
  .tag-50 { background: rgba(249,115,22,0.1); color: #fdba74; border: 1px solid rgba(249,115,22,0.2); }
  .tag-71 { background: rgba(6,182,212,0.1); color: #67e8f9; border: 1px solid rgba(6,182,212,0.2); }
  .tag-quad { background: rgba(236,72,153,0.1); color: #f9a8d4; border: 1px solid rgba(236,72,153,0.2); }
  .tag-live { background: rgba(132,204,22,0.1); color: #bef264; border: 1px solid rgba(132,204,22,0.2); }

  /* NO RESULTS */
  .no-results {
    display: none;
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    grid-column: 1 / -1;
  }
  .no-results.visible { display: block; }

  /* VENDOR HIDDEN */
  .vendor-section-hidden { display: none !important; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  /* LEGEND */
  .legend {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 12px;
    align-items: center;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  @media (max-width: 600px) {
    .vendors-grid { grid-template-columns: 1fr; }
    .stats-bar { gap: 16px; }
  }
</style>
</head>

<div class="container">

      </div>

      <!-- filled by JS -->
    </div>

  <!-- SEARCH -->

    <div class="filters">

      <button class="filter-btn multi-filter" data-filter="live">Live</button>
      <button class="filter-btn multi-filter" data-filter="ms">Mono-Stereo</button>
    </div>
    <div class="legend">
      <span class="legend-item"><span class="tag tag-mono">M</span> Mono</span>
      <span class="legend-item"><span class="tag tag-stereo">S</span> Stereo</span>
      <span class="legend-item"><span class="tag tag-ms">M-S</span> Mono-Stereo</span>

      <span class="legend-item"><span class="tag tag-71">7.1</span> 7.1</span>
      <span class="legend-item"><span class="tag tag-quad">Q</span> Quad</span>
      <span class="legend-item"><span class="tag tag-live">Live</span> Live</span>
    </div>
  </div>

  <!-- VENDOR SECTIONS -->
  <div class="vendors-section">
    <div class="section-header">
      <span class="section-title">Vendors</span>
      <div class="section-line"></div>
      <span id="vendorVisibleCount" style="font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);"></span>
    </div>
    <div class="vendors-grid" id="vendorsGrid">
      <div class="no-results" id="noResults">No plugins found matching your search.</div>
    </div>
  </div>
</div>

// Detect tags from plugin name
function getTags(name) {
  const tags = [];
  const n = name.toLowerCase();
  if (/mono-stereo|mono stereo/.test(n)) tags.push('ms');
  else if (/\bmono\b/.test(n)) tags.push('mono');
  if (!tags.includes('ms') && /\bstereo\b/.test(n)) tags.push('stereo');
  if (/\b5\.0\b/.test(n)) tags.push('50');
  if (/\b5\.1\b/.test(n)) tags.push('51');
  if (/\b7\.1\b/.test(n)) tags.push('71');
  if (/\bquad\b/.test(n)) tags.push('quad');
  if (/\blive\b/.test(n)) tags.push('live');
  return tags;
}

// Render tag HTML
function renderTag(t) {
  const map = {
    mono: ['M', 'tag-mono'],
    stereo: ['S', 'tag-stereo'],
    ms: ['M-S', 'tag-ms'],
    '51': ['5.1', 'tag-51'],
    '50': ['5.0', 'tag-50'],
    '71': ['7.1', 'tag-71'],
    quad: ['Q', 'tag-quad'],
    live: ['Live', 'tag-live']
  };
  const [label, cls] = map[t] || ['?', ''];
  return `<span class="tag ${cls}">${label}</span>`;
}

// Build DOM
let allCards = [];

function buildUI() {
  const grid = document.getElementById('vendorsGrid');
  const vendors = Object.keys(DATA).sort((a,b) => a.localeCompare(b));

  let totalPlugins = 0;
  vendors.forEach(vendor => totalPlugins += DATA[vendor].length);

  // Stats bar
  const statsBar = document.getElementById('statsBar');
  statsBar.innerHTML = `
    <div class="stat"><span class="stat-num">${vendors.length}</span><span class="stat-label">Vendors</span></div>
    <div class="stat"><span class="stat-num">${totalPlugins}</span><span class="stat-label">Plugins</span></div>
    <div class="stat"><span class="stat-num">${countByTag('mono')}</span><span class="stat-label">Mono</span></div>
    <div class="stat"><span class="stat-num">${countByTag('stereo')}</span><span class="stat-label">Stereo</span></div>
    <div class="stat"><span class="stat-num">${countByTag('51')}</span><span class="stat-label">5.1</span></div>
  `;

  vendors.forEach(vendor => {
    const plugins = DATA[vendor].slice().sort((a,b) => a.localeCompare(b));
    const color = VENDOR_COLORS[vendor] || '#6b6b80';

    const card = document.createElement('div');
    card.className = 'vendor-card expanded';
    card.dataset.vendor = vendor;

    const pluginRows = plugins.map(name => {
      const tags = getTags(name);
      const tagsHtml = tags.map(renderTag).join('');
      return `<div class="plugin-item" data-name="${name.toLowerCase()}" data-tags="${tags.join(' ')}">
        <span class="plugin-name">${escHtml(name)}</span>
        <span class="tag-row">${tagsHtml}</span>
      </div>`;
    }).join('');

    card.innerHTML = `
      <div class="vendor-header">
        <div class="vendor-left">
          <div class="vendor-dot" style="background:${color}"></div>
          <span class="vendor-name">${escHtml(vendor)}</span>
        </div>
        <div class="vendor-right">
          <span class="vendor-count">${plugins.length}</span>
          <span class="vendor-toggle">▼</span>
        </div>
      </div>
      <div class="plugin-list">${pluginRows}</div>
    `;

    card.querySelector('.vendor-header').addEventListener('click', () => {
      card.classList.toggle('expanded');
    });

    grid.appendChild(card);
    allCards.push(card);
  });

  updateVendorCount();
}

function countByTag(tag) {
  let c = 0;
  Object.values(DATA).forEach(plugins => {
    plugins.forEach(name => { if (getTags(name).includes(tag)) c++; });
  });
  return c;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function updateVendorCount() {
  const visible = allCards.filter(c => !c.classList.contains('vendor-section-hidden')).length;
  document.getElementById('vendorVisibleCount').textContent = `${visible} / ${allCards.length} vendors`;
}

// SEARCH + FILTER
let currentFilter = 'all';

document.getElementById('searchInput').addEventListener('input', applyFilters);

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    applyFilters();
  });
});

function applyFilters() {
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  let totalVisible = 0;

  allCards.forEach(card => {
    const items = card.querySelectorAll('.plugin-item');
    let cardVisible = 0;

    items.forEach(item => {
      const name = item.dataset.name;
      const tags = item.dataset.tags;
      const nameEl = item.querySelector('.plugin-name');

      // Filter check
      let passFilter = true;
      if (currentFilter !== 'all') {
        passFilter = tags.includes(currentFilter.replace('.',''));
        if (currentFilter === 'mono') passFilter = tags.includes('mono');
        if (currentFilter === 'stereo') passFilter = tags.includes('stereo');
        if (currentFilter === '5.0') passFilter = tags.includes('50');
        if (currentFilter === '5.1') passFilter = tags.includes('51');
        if (currentFilter === '7.1') passFilter = tags.includes('71');
        if (currentFilter === 'quad') passFilter = tags.includes('quad');
        if (currentFilter === 'live') passFilter = tags.includes('live');
        if (currentFilter === 'ms') passFilter = tags.includes('ms');
      }

      // Search check
      let passSearch = true;
      if (query) {
        passSearch = name.includes(query);
        if (passSearch) {
          // Highlight
          const original = item.dataset.originalName || (item.dataset.originalName = nameEl.textContent);
          const idx = original.toLowerCase().indexOf(query);
          if (idx >= 0) {
            nameEl.innerHTML = escHtml(original.slice(0, idx)) +
              '<mark>' + escHtml(original.slice(idx, idx + query.length)) + '</mark>' +
              escHtml(original.slice(idx + query.length));
          }
        } else {
          const original = item.dataset.originalName || nameEl.textContent;
          nameEl.textContent = original;
        }
      } else {
        // Clear highlight
        const original = item.dataset.originalName;
        if (original) nameEl.textContent = original;
      }

      const show = passFilter && passSearch;
      item.classList.toggle('hidden-item', !show);
      if (show) cardVisible++;
    });

    // Also check vendor name
    const vendorName = card.dataset.vendor.toLowerCase();
    let vendorMatch = query && vendorName.includes(query);
    if (vendorMatch) {
      items.forEach(item => {
        const tags = item.dataset.tags;
        let passFilter = true;
        if (currentFilter !== 'all') {
          passFilter = false;
          if (currentFilter === 'mono') passFilter = tags.includes('mono');
          else if (currentFilter === 'stereo') passFilter = tags.includes('stereo');
          else if (currentFilter === '5.0') passFilter = tags.includes('50');
          else if (currentFilter === '5.1') passFilter = tags.includes('51');
          else if (currentFilter === '7.1') passFilter = tags.includes('71');
          else if (currentFilter === 'quad') passFilter = tags.includes('quad');
          else if (currentFilter === 'live') passFilter = tags.includes('live');
          else if (currentFilter === 'ms') passFilter = tags.includes('ms');
        }
        if (passFilter && item.classList.contains('hidden-item')) {
          item.classList.remove('hidden-item');
          cardVisible++;
        }
      });
    }

    const hide = cardVisible === 0;
    card.classList.toggle('vendor-section-hidden', hide);
    totalVisible += cardVisible;

    // Update vendor count badge
    const countBadge = card.querySelector('.vendor-count');
    if (countBadge) countBadge.textContent = cardVisible + (cardVisible !== items.length ? `/${items.length}` : '');
  });

  document.getElementById('searchCount').textContent = query ? `${totalVisible} found` : '';
  document.getElementById('noResults').classList.toggle('visible', totalVisible === 0);
  updateVendorCount();
}

buildUI();
</script>
